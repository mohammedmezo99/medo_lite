name: DeadZone Xiaomi ROM Build

concurrency:
  group: medo-lite-build-queue
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      input_url:
        description: 'URL of the ROM to build'
        required: true
      request_source:
        description: 'Request source label'
        required: false
        default: 'github'
      publish_release:
        description: 'Publish release automatically?'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      builder_name:
        description: 'Name of the builder'
        required: false
      builder_id:
        description: 'ID of the builder'
        required: false
      
jobs:
  Initialize:
    runs-on: ubuntu-latest
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      MEZO_PRIVATE_CHAT_ID: ${{ secrets.MEZO_PRIVATE_CHAT_ID }}
      TELEGRAM_CHAT_GROUP_ID: ${{ secrets.TELEGRAM_CHAT_GROUP_ID }}
      TELEGRAM_RELEASE_GROUP_ID: ${{ secrets.TELEGRAM_RELEASE_GROUP_ID }}
      RCLONE_CONFIG_BASE64: ${{ secrets.RCLONE_CONFIG_BASE64 }}
      RCLONE_REMOTE_NAME: ${{ secrets.RCLONE_REMOTE_NAME }}
      RCLONE_UPLOAD_DIR: ${{ secrets.RCLONE_UPLOAD_DIR }}
      MEZO_CONTACT_LINK: ${{ secrets.MEZO_CONTACT_LINK }}
      UPDATES_GROUP_LINK: ${{ secrets.UPDATES_GROUP_LINK }}
      SCREENSHOTS_GROUP_LINK: ${{ secrets.SCREENSHOTS_GROUP_LINK }}
      CHAT_GROUP_LINK: ${{ secrets.CHAT_GROUP_LINK }}
      CHANGELOG_LINK: ${{ secrets.CHANGELOG_LINK }}
      SCREENSHOTS_POST_LINK: ${{ secrets.SCREENSHOTS_POST_LINK }}
      REQUEST_SOURCE: ${{ inputs.request_source }}
      PUBLISH_RELEASE: ${{ inputs.publish_release }}
    steps:
      - name: Set current stage
        run: echo "CURRENT_STAGE=checkout" >> "$GITHUB_ENV"

      - name: Clean All Unused file,application
        run: |
          docker rmi `docker images -q` || true
          sudo rm -rf /usr/share/dotnet /etc/mysql /etc/php /etc/sudo apt/sources.list.d || true
          sudo apt -y purge azure-cli ghc* zulu* hhvm llvm* firefox google* dotnet* powershell mysql* php* || true
          sudo apt -y autoremove --purge || true
          sudo apt -y autoclean || true
          sudo apt clean || true

      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          swap-size-mb: 1024
          root-reserve-mb: 512
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'

      - name: Set up Time
        run: |
          echo "Setting Vienam timezone"
          sudo timedatectl set-timezone Asia/Ho_Chi_Minh
          
      - name: Install OpenJDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Checkout repository
        uses: actions/checkout@main

      - name: Install Stuff
        run: |
          pip install requests
          sudo bash setup.sh

      - name: Request Received Notification
        run: |
          echo "CURRENT_STAGE=request_acknowledged" >> "$GITHUB_ENV"
          python3 notify.py private request_received
        
      - name: Giving permission
        run: |
          sudo chmod 777 -R *

      - name: Build Started Notification
        run: |
          echo "CURRENT_STAGE=build" >> "$GITHUB_ENV"
          python3 notify.py private build_started

      - name: Build ROM...
        env:
          INPUT_URL: ${{ inputs.input_url }}
        run: |
          sudo bash build.sh "$INPUT_URL" "${{ github.repository }}" "xst" "${{ inputs.builder_name }}" "${{ inputs.builder_id }}"

      - name: Packaging Started Notification
        run: |
          echo "CURRENT_STAGE=package" >> "$GITHUB_ENV"
          python3 notify.py private packaging_started

      - name: Pack ROM...
        run: |
          sudo bash packROM.sh

      - name: Setup Rclone...
        run: |
          echo "CURRENT_STAGE=setup_rclone" >> "$GITHUB_ENV"
          sudo -E bash uploadROM.sh setup

      - name: Upload Started Notification
        run: |
          echo "CURRENT_STAGE=upload_drive" >> "$GITHUB_ENV"
          python3 notify.py private upload_started

      - name: Upload ROM...
        run: |
          sudo -E bash uploadROM.sh

      - name: Success Notification
        if: success()
        run: |
          python3 notify.py private success

      - name: Release Notification
        id: release_post
        if: success() && (startsWith(inputs.request_source, 'telegram') || inputs.publish_release == 'true')
        continue-on-error: true
        run: |
          echo "CURRENT_STAGE=release_notification" >> "$GITHUB_ENV"
          python3 notify.py release success

      - name: Publish Prompt Notification
        if: success() && !(startsWith(inputs.request_source, 'telegram') || inputs.publish_release == 'true')
        run: |
          python3 notify.py private publish_prompt

      - name: Release Failure Notification
        if: steps.release_post.outcome == 'failure'
        run: |
          python3 notify.py private fail release_notification

      - name: Failure Notification
        if: failure()
        run: |
          python3 notify.py private fail
